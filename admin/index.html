<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel De Edicion | Osiris Damas</title>
  <style>
    body{font-family:Arial,sans-serif;margin:0;min-height:100vh;display:grid;place-items:center;background:#fdf5f9;color:#1a0012}
    .admin-loading{max-width:540px;padding:2rem;text-align:center}
    .admin-loading h1{margin:0 0 .75rem;font-size:1.6rem}
    .admin-loading p{margin:0;color:#5a2050;line-height:1.6}
  </style>
</head>
<body>
  <div class="admin-loading">
    <h1>Panel De Edicion</h1>
    <p>Si vienes desde un correo de invitacion o recuperacion, espera unos segundos. El acceso debe abrir automaticamente.</p>
  </div>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script>
    window.addEventListener('load',()=>{
      if(!window.netlifyIdentity)return;

      const hash=window.location.hash||'';
      const hasIdentityToken=/(invite_token|recovery_token|confirmation_token|email_change_token)=/.test(hash);

      window.netlifyIdentity.init();

      if(hasIdentityToken){
        window.netlifyIdentity.open();
      }

      window.netlifyIdentity.on('init',user=>{
        if(!user&&hasIdentityToken){
          window.netlifyIdentity.open();
        }
      });
    });
  </script>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
