<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel De Edicion | Rene Ceron</title>
  <style>
    body{font-family:Arial,sans-serif;margin:0;min-height:100vh;display:grid;place-items:center;background:#fdf5f9;color:#1a0012}
    .admin-loading{max-width:560px;padding:2rem;text-align:center}
    .admin-loading h1{margin:0 0 .75rem;font-size:1.6rem}
    .admin-loading p{margin:0;color:#5a2050;line-height:1.6}
    .admin-actions{display:flex;justify-content:center;gap:.8rem;flex-wrap:wrap;margin-top:1.25rem}
    .admin-btn{appearance:none;border:none;border-radius:10px;padding:.9rem 1.2rem;font-size:.95rem;font-weight:700;cursor:pointer}
    .admin-btn-primary{background:#d90368;color:#fff}
    .admin-btn-secondary{background:#fff;color:#5a2050;border:1px solid rgba(90,32,80,.18)}
    .admin-status{margin-top:1rem;font-size:.92rem;color:#5a2050;min-height:1.4rem}
  </style>
</head>
<body>
  <div class="admin-loading">
    <h1>Panel De Edicion</h1>
    <p>Si vienes desde un correo de invitacion o recuperacion, el acceso debe abrir automaticamente. Si no pasa nada, usa el boton de abajo.</p>
    <div class="admin-actions">
      <button id="open-identity" class="admin-btn admin-btn-primary" type="button">Abrir acceso</button>
      <button id="reload-admin" class="admin-btn admin-btn-secondary" type="button">Recargar panel</button>
    </div>
    <div id="admin-status" class="admin-status">Cargando acceso...</div>
  </div>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js" defer></script>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded',()=>{
      const status=document.getElementById('admin-status');
      const openButton=document.getElementById('open-identity');
      const reloadButton=document.getElementById('reload-admin');
      const hash=window.location.hash||'';
      const hasIdentityToken=/(invite_token|recovery_token|confirmation_token|email_change_token)=/.test(hash);

      function setStatus(message){
        if(status)status.textContent=message;
      }

      function openIdentity(){
        if(window.netlifyIdentity){
          window.netlifyIdentity.open();
        }else{
          setStatus('Netlify Identity todavia no carga. Espera 2 segundos y vuelve a intentar.');
        }
      }

      reloadButton.addEventListener('click',()=>{
        window.location.reload();
      });

      openButton.addEventListener('click',openIdentity);

      function initIdentity(retryCount=0){
        if(!window.netlifyIdentity){
          if(retryCount < 20){
            setStatus('Preparando acceso...');
            setTimeout(()=>initIdentity(retryCount+1),250);
          }else{
            setStatus('Netlify Identity no cargo. Revisa que Identity este activado en Netlify y luego recarga el panel.');
          }
          return;
        }

        window.netlifyIdentity.init();
        setStatus(hasIdentityToken ? 'Token detectado. Abriendo acceso...' : 'Haz clic en "Abrir acceso" para iniciar sesion.');

        if(hasIdentityToken){
          setTimeout(openIdentity,300);
        }

        window.netlifyIdentity.on('init',user=>{
          if(user){
            setStatus('Sesion detectada. Entrando al panel...');
            window.location.replace('/admin/');
          }
        });

        window.netlifyIdentity.on('login',()=>{
          setStatus('Acceso correcto. Entrando al panel...');
          window.location.replace('/admin/');
        });

        window.netlifyIdentity.on('error',err=>{
          setStatus(`Error de acceso: ${err.message}`);
        });
      }

      initIdentity();
    });
  </script>
</body>
</html>
